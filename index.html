<style>
  :root{
    --bg:#0d0d0f; --surface:#16161a; --line:#2a2a30;
    --text:#f2f2f4; --muted:#8b8b94; --accent:#5b8cff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    display:flex; flex-direction:column;
  }

  header{
    display:flex; align-items:center; gap:6px;
    padding:8px 10px calc(8px + env(safe-area-inset-top));
    padding-top:max(8px, env(safe-area-inset-top));
    background:var(--surface); border-bottom:0.5px solid var(--line);
    flex-shrink:0;
  }
  .tab{
    flex:1; min-width:0; font:inherit; font-size:13px; font-weight:500;
    padding:9px 6px; border-radius:9px; border:0.5px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    transition:background .15s,color .15s,border-color .15s;
  }
  .tab.active{ background:rgba(91,140,255,.16); color:#cfe0ff; border-color:rgba(91,140,255,.5); }

  main{ position:relative; flex:1; overflow:hidden; }

  .track{
    display:flex; height:100%; width:100%;
    transition:transform .32s cubic-bezier(.4,.0,.2,1);
    will-change:transform;
  }
  .track.dragging{ transition:none; }

  .slide{
    flex:0 0 100%; width:100%; height:100%; position:relative;
    background:var(--bg);
  }
  .slide iframe{ width:100%; height:100%; border:0; display:block; background:#fff; }

  .fallback{
    position:absolute; inset:0; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:16px; text-align:center; padding:0 32px; background:var(--surface);
  }
  .fallback.show{ display:flex; }
  .fallback h2{ font-size:19px; font-weight:600; }
  .fallback p{ font-size:13px; color:var(--muted); line-height:1.6; max-width:300px; }
  .fallback a{
    display:inline-block; margin-top:4px; padding:11px 22px; border-radius:11px;
    background:var(--accent); color:#fff; text-decoration:none; font-size:14px; font-weight:600;
  }
  .fallback .retry{
    font:inherit; font-size:14px; font-weight:600; color:var(--text);
    padding:11px 22px; border-radius:11px; cursor:pointer;
    background:transparent; border:0.5px solid var(--line);
  }

  .arrow{
    position:absolute; top:50%; transform:translateY(-50%); z-index:5;
    width:42px; height:42px; border-radius:50%;
    background:rgba(22,22,26,.82); border:0.5px solid var(--line); color:var(--text);
    font-size:22px; line-height:1; cursor:pointer; backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; user-select:none;
  }
  .arrow:active{ transform:translateY(-50%) scale(.92); }
  #prev{ left:10px; } #next{ right:10px; }
  @media (hover:none){ .arrow{ display:none; } }

  footer{
    display:flex; align-items:center; justify-content:center; gap:9px;
    padding:10px 0 calc(10px + env(safe-area-inset-bottom));
    padding-bottom:max(10px, env(safe-area-inset-bottom));
    background:var(--surface); border-top:0.5px solid var(--line); flex-shrink:0;
  }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--line); cursor:pointer; transition:background .15s,width .15s; }
  .dot.active{ background:var(--accent); width:22px; border-radius:5px; }
</style>
</head>
<body>

<header id="tabs"></header>

<main>
  <div class="track" id="track"></div>
  <button class="arrow" id="prev" aria-label="이전">‹</button>
  <button class="arrow" id="next" aria-label="다음">›</button>
</main>

<footer id="dots"></footer>

<script>
const SITES = [
  { name:"Needles",  url:"https://wg052026.github.io/needles-tracker/" },
  { name:"Kapital",  url:"https://wg052026.github.io/kapital-tracker/" },
  { name:"Supreme",  url:"https://wg052026.github.io/supreme-tracker/" },
  { name:"Finboard", url:"https://wg052026.github.io/finboard-/" },
];

const track = document.getElementById('track');
const tabsEl = document.getElementById('tabs');
const dotsEl = document.getElementById('dots');
let idx = 0;
const loaded = new Array(SITES.length).fill(false);

SITES.forEach((s, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.innerHTML =
    '<iframe data-i="'+i+'" title="'+s.name+'" loading="lazy"></iframe>' +
    '<div class="fallback" data-i="'+i+'">' +
      '<h2>'+s.name+'</h2>' +
      '<p>로딩이 오래 걸리고 있어요. 잠시 더 기다리거나 아래 버튼을 눌러보세요.</p>' +
      '<button class="retry" data-i="'+i+'">다시 불러오기</button>' +
      '<a href="'+s.url+'" target="_blank" rel="noopener">새 탭에서 열기</a>' +
    '</div>';
  track.appendChild(slide);

  const tab = document.createElement('button');
  tab.className = 'tab' + (i===0?' active':'');
  tab.textContent = s.name;
  tab.onclick = () => go(i);
  tabsEl.appendChild(tab);

  const dot = document.createElement('span');
  dot.className = 'dot' + (i===0?' active':'');
  dot.setAttribute('aria-label', s.name);
  dot.onclick = () => go(i);
  dotsEl.appendChild(dot);
});

const tabs = [...tabsEl.children];
const dots = [...dotsEl.children];
const frames = [...document.querySelectorAll('iframe')];
const fallbacks = [...document.querySelectorAll('.fallback')];

function loadFrame(i){
  if(loaded[i]) return;
  loaded[i] = true;
  startLoad(i);
}

function startLoad(i){
  const f = frames[i];
  const fb = fallbacks[i];
  fb.classList.remove('show');
  const timer = setTimeout(()=>{ fb.classList.add('show'); }, 12000);
  f.addEventListener('load', ()=>{
    clearTimeout(timer);
    fb.classList.remove('show');
  }, { once:true });
  f.src = SITES[i].url;
}

// 다시 불러오기 버튼
document.querySelectorAll('.retry').forEach(btn=>{
  btn.onclick = ()=>{
    const i = +btn.dataset.i;
    fallbacks[i].classList.remove('show');
    startLoad(i);
  };
});

function render(){
  track.style.transform = 'translateX(' + (-idx*100) + '%)';
  tabs.forEach((t,i)=>t.classList.toggle('active', i===idx));
  dots.forEach((d,i)=>d.classList.toggle('active', i===idx));
  loadFrame(idx);
  loadFrame(idx+1);
  loadFrame(idx-1);
}

function go(n){
  idx = (n + SITES.length) % SITES.length;
  render();
}

document.getElementById('next').onclick = () => go(idx+1);
document.getElementById('prev').onclick = () => go(idx-1);
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(idx+1);
  if(e.key==='ArrowLeft')  go(idx-1);
});

// ---- swipe / drag ----
let startX=0, startY=0, dragging=false, locked=null;
const main = document.querySelector('main');

function down(x,y){ startX=x; startY=y; dragging=true; locked=null; track.classList.add('dragging'); }
function move(x,y,e){
  if(!dragging) return;
  const dx=x-startX, dy=y-startY;
  if(locked===null){
    if(Math.abs(dx)<8 && Math.abs(dy)<8) return;
    locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
  }
  if(locked!=='h') return;
  if(e && e.cancelable) e.preventDefault();
  const base = -idx*100;
  const pct = dx / main.offsetWidth * 100;
  track.style.transform = 'translateX(' + (base+pct) + '%)';
}
function up(x){
  if(!dragging) return;
  dragging=false; track.classList.remove('dragging');
  if(locked!=='h'){ render(); return; }
  const dx=x-startX;
  const th = main.offsetWidth*0.18;
  if(dx<-th) go(idx+1);
  else if(dx>th) go(idx-1);
  else render();
}

main.addEventListener('touchstart', e=>down(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
main.addEventListener('touchmove',  e=>move(e.touches[0].clientX,e.touches[0].clientY,e), {passive:false});
main.addEventListener('touchend',   e=>up((e.changedTouches[0]||{}).clientX||startX));

let mouseDown=false;
main.addEventListener('mousedown', e=>{
  if(e.target.tagName==='IFRAME') return;
  mouseDown=true; down(e.clientX,e.clientY); e.preventDefault();
});
window.addEventListener('mousemove', e=>{ if(mouseDown) move(e.clientX,e.clientY,e); });
window.addEventListener('mouseup',   e=>{ if(mouseDown){ mouseDown=false; up(e.clientX); } });

render();
</script>
</body>
</html>
